name: Kernel checks

on:
  push:
  pull_request:

jobs:
  build-and-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kernel tools
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib grub-pc-bin xorriso qemu-system-x86
      - name: Static checks
        run: make clean test
      - name: Headless boot test
        run: make test-boot
      - name: Upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-log
          path: build/boot-test.log
